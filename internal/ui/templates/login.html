{{define "login"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Agents</title>
    <link rel="icon" type="image/png" href="/static/img/favicon.png">
    <link rel="stylesheet" href="/static/css/basic.css">
    <link rel="stylesheet" href="/static/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-box {
            background-color: #2a2a2a;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 2rem;
            width: 100%;
            max-width: 360px;
        }
        .login-box h1 {
            margin: 0 0 1.5rem;
            font-size: 1.4rem;
            text-align: center;
            color: #fff;
        }
        .login-box h1 i {
            margin-right: 0.5rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.4rem;
            color: #ccc;
            font-size: 0.9rem;
        }
        .form-group input {
            width: 100%;
            padding: 0.6rem 0.8rem;
            background-color: #1a1a1a;
            border: 1px solid #555;
            border-radius: 4px;
            color: #fff;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: none;
            border-color: #888;
        }
        .error-msg {
            color: #e06c75;
            font-size: 0.875rem;
            margin-bottom: 1rem;
            text-align: center;
        }
        .btn-login {
            width: 100%;
            padding: 0.7rem;
            background-color: #4a9eff;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
        }
        .btn-login:hover {
            background-color: #3a8eef;
        }
    </style>
</head>
<body class="dark-theme">
    <div class="login-container">
        <div class="login-box">
            <h1><i class="fas fa-robot"></i> AI Agents</h1>
            {{if .Error}}<p class="error-msg">{{.Error}}</p>{{end}}
            <form method="POST" action="/login">
                <div class="form-group">
                    <label for="key">Access Key</label>
                    <input type="password" id="key" name="key" placeholder="Enter your access key" autofocus>
                </div>
                <button type="submit" class="btn-login">Sign In</button>
            </form>
        </div>
    </div>
</body>
</html>
{{end}}
